<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArchiVe Shared List</title>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text: #111;
    --muted: #666;
    --border: #e5e5e5;
    --accent: #00897B;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f0f;
      --card: #1e1e1e;
      --text: #f5f5f5;
      --muted: #aaa;
      --border: #333;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 16px 80px; }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 16px;
  }
  .brand {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 1px;
  }
  h1 { font-size: 24px; margin: 4px 0 8px; }
  .meta { color: var(--muted); font-size: 13px; }
  .item {
    display: flex;
    gap: 12px;
    padding: 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    text-decoration: none;
    color: inherit;
    transition: transform 0.1s;
  }
  .item:hover { transform: translateY(-1px); }
  .thumb {
    width: 96px;
    height: 56px;
    object-fit: cover;
    border-radius: 4px;
    background: var(--border);
    flex-shrink: 0;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-title {
    font-size: 14px;
    font-weight: 600;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    margin-bottom: 4px;
  }
  .item-url {
    font-size: 11px;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .loading, .error {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">ArchiVe</div>
    <h1 id="title">Loading...</h1>
    <div class="meta" id="meta"></div>
  </header>
  <div id="content" class="loading">Loading shared list...</div>
  <footer>
    Powered by <a href="#" id="app-link">ArchiVe</a>
  </footer>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyABGyj3WMdKLq6FzHf1X1yjbq3pF05561k",
  authDomain: "archive-e4efc.firebaseapp.com",
  projectId: "archive-e4efc",
  storageBucket: "archive-e4efc.firebasestorage.app",
  messagingSenderId: "145261305649",
  appId: "1:145261305649:web:484ad5fe1fd577e0ce1a10"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// パスから shareId を抽出: /s/{shareId}
const path = window.location.pathname;
const match = path.match(/^\/s\/([a-zA-Z0-9_-]+)$/);

const titleEl = document.getElementById("title");
const metaEl = document.getElementById("meta");
const contentEl = document.getElementById("content");

if (!match) {
  titleEl.textContent = "Invalid URL";
  contentEl.textContent = "";
  contentEl.className = "error";
  contentEl.textContent = "Share URL not recognized.";
} else {
  const shareId = match[1];
  loadShare(shareId);
}

async function loadShare(shareId) {
  try {
    const snap = await getDoc(doc(db, "shared_lists", shareId));
    if (!snap.exists()) {
      titleEl.textContent = "Not found";
      contentEl.className = "error";
      contentEl.textContent = "This share has been removed or does not exist.";
      return;
    }
    const data = snap.data();
    document.title = `${data.listName} - ArchiVe`;
    titleEl.textContent = data.listName || "(Untitled)";
    metaEl.textContent = `${data.itemCount || 0} items`;
    renderItems(data.items || []);
  } catch (e) {
    console.error(e);
    titleEl.textContent = "Error";
    contentEl.className = "error";
    contentEl.textContent = `Failed to load: ${e.message}`;
  }
}

function renderItems(items) {
  contentEl.className = "";
  contentEl.innerHTML = "";
  if (items.length === 0) {
    contentEl.className = "loading";
    contentEl.textContent = "No items.";
    return;
  }
  for (const item of items) {
    const a = document.createElement("a");
    a.className = "item";
    a.href = item.url || "#";
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    if (item.image) {
      const img = document.createElement("img");
      img.className = "thumb";
      img.src = item.image;
      img.loading = "lazy";
      img.onerror = () => img.style.display = "none";
      a.appendChild(img);
    } else {
      const ph = document.createElement("div");
      ph.className = "thumb";
      a.appendChild(ph);
    }

    const body = document.createElement("div");
    body.className = "item-body";
    const t = document.createElement("div");
    t.className = "item-title";
    t.textContent = item.title || "(Untitled)";
    body.appendChild(t);
    const u = document.createElement("div");
    u.className = "item-url";
    u.textContent = item.url || "";
    body.appendChild(u);

    a.appendChild(body);
    contentEl.appendChild(a);
  }
}
</script>
</body>
</html>
