workflows:
  ios-release:
    name: iOS Release

    environment:
      flutter: stable

    scripts:

      - name: Flutter doctor
        script: |
          flutter doctor -v

      - name: Clean
        script: |
          flutter clean

      - name: Pub get
        script: |
          flutter pub get

      - name: Precache iOS
        script: |
          flutter precache --ios

      - name: Install Pods
        script: |
          cd ios
          rm -rf Pods
          rm Podfile.lock
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa